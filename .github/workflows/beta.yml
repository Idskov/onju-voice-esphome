name: Beta firmware

on:
  push:
    branches: [dev]
    paths:
      - 'onju-voice.yaml'
  workflow_dispatch:

concurrency:
  group: beta
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bump-version:
    name: Auto-bump dev version
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch'
    outputs:
      bumped: ${{ steps.bump.outputs.bumped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Find last beta tag or fall back to initial commit
          LAST=$(git describe --tags --match "beta" --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

          # Get conventional commit types since last beta
          COMMITS=$(git log "$LAST"..HEAD --format="%s" -- onju-voice.yaml)

          if [ -z "$COMMITS" ]; then
            echo "No relevant commits since last beta"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          BUMP=""
          if echo "$COMMITS" | grep -qE "^feat(\(|:|!)"; then
            BUMP=minor
          elif echo "$COMMITS" | grep -qE "^fix(\(|:|!)"; then
            BUMP=patch
          fi

          if [ -z "$BUMP" ]; then
            echo "No feat/fix commits — no bump needed"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract current version
          CURRENT=$(grep 'x-release-please-version' onju-voice.yaml | sed 's/.*version: *"\([^"]*\)".*/\1/')
          # Strip -dev suffix for calculation
          BASE=${CURRENT%-dev}
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          if [ "$BUMP" = "minor" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW="${MAJOR}.${MINOR}.${PATCH}-dev"

          if [ "$NEW" = "$CURRENT" ]; then
            echo "Version already at $NEW"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Bumping $CURRENT -> $NEW ($BUMP)"
          sed -i "s/version: \"${CURRENT}\"/version: \"${NEW}\"/" onju-voice.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add onju-voice.yaml
          git commit -m "chore: bump dev version to ${NEW} [skip ci]"
          git push

          echo "bumped=true" >> "$GITHUB_OUTPUT"

  build:
    name: Build beta firmware
    needs: bump-version
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .esphome
          key: pio-beta-${{ hashFiles('onju-voice.yaml') }}
          restore-keys: pio-beta-

      - name: Build firmware
        run: esphome compile onju-voice.yaml

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'x-release-please-version' onju-voice.yaml | sed 's/.*version: *"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Find and rename binaries
        run: |
          BUILD_DIR=$(find .esphome/build -name ".pioenvs" -type d | head -1)
          DEVICE_DIR=$(ls "$BUILD_DIR" | head -1)
          cp "$BUILD_DIR/$DEVICE_DIR/firmware.bin" "onju-voice-beta.ota.bin"
          FACTORY=$(find "$BUILD_DIR/$DEVICE_DIR" -name "*.factory.bin" | head -1)
          if [ -n "$FACTORY" ]; then
            cp "$FACTORY" "onju-voice-beta.factory.bin"
          fi

      - name: Generate update manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          MD5=$(md5sum "onju-voice-beta.ota.bin" | cut -d' ' -f1)
          cat > manifest.json <<EOF
          {
            "name": "Onju Voice",
            "version": "${VERSION}",
            "builds": [{
              "chipFamily": "ESP32-S3",
              "ota": {
                "path": "onju-voice-beta.ota.bin",
                "md5": "${MD5}",
                "summary": "Beta — tested but unreleased",
                "release_url": "https://github.com/${{ github.repository }}/releases/tag/beta"
              }
            }]
          }
          EOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beta-firmware
          path: |
            onju-voice-beta.*.bin
            manifest.json
          if-no-files-found: error

  release:
    name: Publish beta release
    needs: build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          name: beta-firmware

      - name: Update beta release
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)

          # Delete existing beta release if it exists
          gh release delete beta --yes 2>/dev/null || true
          git push origin :refs/tags/beta 2>/dev/null || true

          gh release create beta \
            --title "Beta — ${VERSION} (${COMMIT})" \
            --notes "Pre-release beta firmware built from \`dev\` branch.

          **Version:** ${VERSION}
          **Commit:** ${COMMIT}
          **Built:** $(date -u '+%Y-%m-%d %H:%M UTC')

          These binaries are tested locally before push but are not officially released.
          For stable firmware, see the [latest release](https://github.com/${{ github.repository }}/releases/latest).

          | File | Use |
          |------|-----|
          | \`onju-voice-beta.ota.bin\` | OTA update via captive portal |
          | \`onju-voice-beta.factory.bin\` | First-time USB flash |" \
            --prerelease \
            onju-voice-beta.*.bin \
            manifest.json
