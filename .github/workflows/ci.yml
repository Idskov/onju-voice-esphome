name: CI

on:
  pull_request:
    branches:
      - main
      - dev

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-firmware:
    name: Validate firmware
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/esphome/esphome:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .esphome
          key: pio-esphome-${{ hashFiles('onju-voice.yaml') }}

      - name: Validate ESPHome config
        run: esphome config onju-voice.yaml

      - name: Compile firmware
        run: esphome compile onju-voice.yaml

  run-unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v
