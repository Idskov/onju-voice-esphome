# Onju Voice Satellite — Native ESPHome config
# A drop-in ESPHome firmware for the Onju Voice PCB that turns a
# Google Nest Mini (2nd gen) into a Home Assistant voice satellite.
#
# Works with ESPHome 2026.3+ using only native components.
# No external dependencies, no abandoned libraries.
#
# Hardware: Onju Voice PCB (ESP32-S3) by justLV
#   I2S: LRCLK=GPIO13, BCLK=GPIO18, DOUT=GPIO12, DIN=GPIO17
#   LEDs: GPIO11 (6x SK6812)
#   Touch: GPIO4 (vol-), GPIO3 (action), GPIO2 (vol+)
#   Mute: GPIO38 (pull-up)
#   DAC mute: GPIO21 (active low)

substitutions:
  name: onju-voice
  friendly_name: Onju Voice

esphome:
  name: ${name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  project:
    name: idskov.onju_voice
    version: "1.0.0"
  platformio_options:
    board_build.flash_mode: dio
    board_build.arduino.memory_type: qio_opi
  on_boot:
    then:
      - light.turn_on:
          id: top_led
          effect: slow_pulse
          red: 100%
          green: 60%
          blue: 0%
      - wait_until:
          condition:
            wifi.connected:
      - light.turn_on:
          id: top_led
          effect: pulse
          red: 0%
          green: 100%
          blue: 0%
      - wait_until:
          condition:
            api.connected:
      - light.turn_on:
          id: top_led
          effect: none
          red: 0%
          green: 100%
          blue: 0%
      - delay: 1s
      - script.execute: reset_led

dashboard_import:
  package_import_url: github://idskov/onju-voice-esphome/onju-voice.yaml@master

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"

psram:
  mode: octal
  speed: 80MHz

logger:

ota:
  - platform: esphome

improv_serial:

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:

api:

# --- Audio ---
# The Onju Voice has a shared I2S bus for both microphone and speaker.
# They cannot run simultaneously — ESPHome handles bus arbitration via
# the media_player wrapper.

i2s_audio:
  - id: i2s_shared
    i2s_lrclk_pin: GPIO13
    i2s_bclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    id: onju_mic
    i2s_audio_id: i2s_shared
    i2s_din_pin: GPIO17
    adc_type: external
    channel: left
    sample_rate: 16000
    bits_per_sample: 32bit

speaker:
  - platform: i2s_audio
    id: onju_speaker
    i2s_audio_id: i2s_shared
    i2s_dout_pin: GPIO12
    dac_type: external
    channel: left
    sample_rate: 16000
    bits_per_sample: 32bit
    buffer_duration: 100ms

media_player:
  - platform: speaker
    name: None
    id: onju_media_player
    announcement_pipeline:
      speaker: onju_speaker
      format: FLAC
      sample_rate: 16000
      num_channels: 1
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
      - light.turn_on:
          id: top_led
          blue: 0%
          red: 20%
          green: 100%
          effect: speaking
    on_idle:
      - script.execute: start_wake_word
      - script.execute: reset_led

# --- Wake word (on-device) ---

micro_wake_word:
  id: mww
  models:
    - model: okay_nabu
    - model: hey_jarvis
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# --- Voice Assistant ---

voice_assistant:
  id: va
  microphone: onju_mic
  media_player: onju_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 3.0

  on_client_connected:
    - script.execute: start_wake_word
  on_client_disconnected:
    - script.execute: stop_wake_word

  on_listening:
    - light.turn_on:
        id: top_led
        blue: 100%
        red: 100%
        green: 100%
        brightness: 100%
        effect: listening

  on_stt_vad_end:
    - light.turn_on:
        id: top_led
        blue: 100%
        red: 0%
        green: 20%
        brightness: 70%
        effect: processing

  on_end:
    # Don't reset LED or restart MWW here.
    # on_idle in media_player handles both after speaker finishes.
    []

  on_error:
    - script.execute: reset_led
    - script.execute: start_wake_word

# --- LEDs (6x SK6812) ---

light:
  - platform: esp32_rmt_led_strip
    id: leds
    pin: GPIO11
    chipset: SK6812
    num_leds: 6
    rgb_order: grb
    default_transition_length: 0s
    gamma_correct: 2.8

  - platform: partition
    id: left_led
    segments:
      - id: leds
        from: 0
        to: 0
    default_transition_length: 100ms

  - platform: partition
    id: top_led
    segments:
      - id: leds
        from: 1
        to: 4
    default_transition_length: 100ms
    effects:
      - pulse:
          name: pulse
          transition_length: 250ms
          update_interval: 250ms
      - pulse:
          name: slow_pulse
          transition_length: 1s
          update_interval: 2s
      - addressable_twinkle:
          name: listening_ww
          twinkle_probability: 1%
      - addressable_twinkle:
          name: listening
          twinkle_probability: 45%
      - addressable_scan:
          name: processing
          move_interval: 80ms
      - addressable_flicker:
          name: speaking
          intensity: 35%
      - addressable_lambda:
          name: show_volume
          update_interval: 50ms
          lambda: |-
            int int_volume = int(id(onju_media_player).volume * 100.0f * it.size());
            int full_leds = int_volume / 100;
            int last_brightness = int_volume % 100;
            int i = 0;
            for(; i < full_leds; i++) {
              it[i] = Color::WHITE;
            }
            if(i < 4) {
              it[i++] = Color(64, 64, 64).fade_to_white(last_brightness*256/100);
            }
            for(; i < it.size(); i++) {
              it[i] = Color(64, 64, 64);
            }

  - platform: partition
    id: right_led
    segments:
      - id: leds
        from: 5
        to: 5
    default_transition_length: 100ms

# --- Touch controls ---
# ESP32-S3 touch threshold is a delta value (not absolute) in ESP-IDF 5.x.
# 2000 works well for the Nest Mini's capacitive top panel.

esp32_touch:
  setup_mode: false
  measurement_duration: 0.25ms
  sleep_duration: 2ms

binary_sensor:
  - platform: esp32_touch
    id: volume_down
    pin: GPIO4
    threshold: 2000
    on_press:
      then:
        - light.turn_on: left_led
        - script.execute:
            id: adjust_volume
            delta: -0.05
        - delay: 750ms
        - while:
            condition:
              binary_sensor.is_on: volume_down
            then:
              - script.execute:
                  id: adjust_volume
                  delta: -0.05
              - delay: 150ms
    on_release:
      then:
        - light.turn_off: left_led
        - script.execute: show_volume_then_restore

  - platform: esp32_touch
    id: volume_up
    pin: GPIO2
    threshold: 2000
    on_press:
      then:
        - light.turn_on: right_led
        - script.execute:
            id: adjust_volume
            delta: 0.05
        - delay: 750ms
        - while:
            condition:
              binary_sensor.is_on: volume_up
            then:
              - script.execute:
                  id: adjust_volume
                  delta: 0.05
              - delay: 150ms
    on_release:
      then:
        - light.turn_off: right_led
        - script.execute: show_volume_then_restore

  - platform: esp32_touch
    id: action
    pin: GPIO3
    threshold: 2000
    on_click:
      - if:
          condition: voice_assistant.is_running
          then:
            - voice_assistant.stop:
          else:
            - voice_assistant.start:

  - platform: gpio
    id: mute_switch
    pin:
      number: GPIO38
      mode: INPUT_PULLUP
    name: Disable wake word
    on_press:
      - script.execute: stop_wake_word
    on_release:
      - script.execute: start_wake_word

# --- Switches ---

switch:
  - platform: template
    name: Use Wake Word
    id: use_wake_word
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: start_wake_word
    on_turn_off:
      - script.execute: stop_wake_word

  - platform: template
    name: Wake Word Listening Light
    id: flicker_wake_word
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: reset_led
    on_turn_off:
      - script.execute: reset_led

  - platform: gpio
    id: dac_mute
    restore_mode: ALWAYS_OFF
    pin:
      number: GPIO21
      inverted: true

# --- Globals ---

globals:
  - id: showing_volume
    type: bool
    restore_value: false
    initial_value: "false"

# --- Scripts ---

script:
  - id: reset_led
    then:
      - if:
          condition:
            lambda: return id(showing_volume);
          then:
            []
          else:
            - if:
                condition:
                  and:
                    - switch.is_on: use_wake_word
                    - switch.is_on: flicker_wake_word
                    - binary_sensor.is_off: mute_switch
                then:
                  - light.turn_on:
                      id: top_led
                      blue: 100%
                      red: 100%
                      green: 0%
                      brightness: 60%
                      effect: listening_ww
                else:
                  - light.turn_off: top_led

  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - binary_sensor.is_off: mute_switch
              - switch.is_on: use_wake_word
          then:
            - micro_wake_word.start
            - script.execute: reset_led

  - id: stop_wake_word
    then:
      - micro_wake_word.stop
      - script.execute: reset_led

  - id: adjust_volume
    parameters:
      delta: float
    then:
      - lambda: id(showing_volume) = true;
      - media_player.volume_set:
          id: onju_media_player
          volume: !lambda return clamp(id(onju_media_player).volume + delta, 0.0f, 1.0f);
      - light.turn_on:
          id: top_led
          effect: show_volume

  - id: show_volume_then_restore
    mode: restart
    then:
      - delay: 2s
      - lambda: id(showing_volume) = false;
      - script.execute: reset_led
