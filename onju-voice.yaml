# Onju Voice Satellite — Native ESPHome config
# A drop-in ESPHome firmware for the Onju Voice PCB that turns a
# Google Nest Mini (2nd gen) into a Home Assistant voice satellite.
#
# Works with ESPHome 2026.3+ using only native components.
# No external dependencies, no abandoned libraries.
#
# Hardware: Onju Voice PCB (ESP32-S3) by justLV
#   I2S: LRCLK=GPIO13, BCLK=GPIO18, DOUT=GPIO12, DIN=GPIO17
#   LEDs: GPIO11 (6x SK6812)
#   Touch: GPIO4 (vol-), GPIO3 (action), GPIO2 (vol+)
#   Mute: GPIO38 (pull-up)
#   DAC mute: GPIO21 (active low)

substitutions:
  name: onju-voice
  friendly_name: Onju Voice

esphome:
  name: ${name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  min_version: 2026.3.0
  project:
    name: idskov.onju_voice
    version: "1.2.0"
  platformio_options:
    board_build.flash_mode: dio
    board_build.arduino.memory_type: qio_opi
  on_boot:
    then:
      - light.turn_on:
          id: top_led
          effect: slow_pulse
          red: 100%
          green: 60%
          blue: 0%
      - wait_until:
          condition:
            wifi.connected:
      - light.turn_on:
          id: top_led
          effect: pulse
          red: 0%
          green: 100%
          blue: 0%
      - wait_until:
          condition:
            api.connected:
      - light.turn_on:
          id: top_led
          effect: none
          red: 0%
          green: 100%
          blue: 0%
      - delay: 1s
      - script.execute: reset_led

dashboard_import:
  package_import_url: github://idskov/onju-voice-esphome/onju-voice.yaml@master

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"

psram:
  mode: octal
  speed: 80MHz

logger:

ota:
  - platform: esphome

improv_serial:

wifi:
  ap:
    ssid: "${friendly_name}"

captive_portal:

api:

# --- Audio ---
# The Onju Voice has a shared I2S bus for both microphone and speaker.
# They cannot run simultaneously — ESPHome handles bus arbitration via
# the media_player wrapper.

i2s_audio:
  - id: i2s_shared
    i2s_lrclk_pin: GPIO13
    i2s_bclk_pin: GPIO18

microphone:
  - platform: i2s_audio
    id: onju_mic
    i2s_audio_id: i2s_shared
    i2s_din_pin: GPIO17
    adc_type: external
    channel: left
    sample_rate: 16000
    bits_per_sample: 32bit

speaker:
  - platform: i2s_audio
    id: i2s_speaker
    i2s_audio_id: i2s_shared
    i2s_dout_pin: GPIO12
    dac_type: external
    channel: left
    sample_rate: 16000
    bits_per_sample: 32bit
    buffer_duration: 100ms

  - platform: mixer
    id: onju_mixer
    output_speaker: i2s_speaker
    queue_mode: true
    source_speakers:
      - id: announcement_speaker
      - id: media_speaker
      - id: alert_speaker

media_player:
  - platform: speaker
    name: None
    id: onju_media_player
    task_stack_in_psram: true
    volume_increment: 0.05
    volume_min: 0.0
    volume_max: 1.0
    announcement_pipeline:
      speaker: announcement_speaker
      format: FLAC
      sample_rate: 16000
      num_channels: 1
    media_pipeline:
      speaker: media_speaker
      format: FLAC
      sample_rate: 16000
      num_channels: 1
    on_announcement:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
      - script.execute: reset_led
    on_play:
      - if:
          condition:
            - microphone.is_capturing:
          then:
            - script.execute: stop_wake_word
      - script.execute: reset_led
    on_idle:
      - script.execute: start_wake_word
      - script.execute: reset_led

# --- Alerts (RTTTL) ---
# Routes through alert_speaker in the mixer.
# Volume click plays only when media_player is idle (skip if busy).
# Timer alarm queues behind active audio via mixer queue_mode.

rtttl:
  id: buzzer
  speaker: alert_speaker

# --- Wake word (on-device) ---

micro_wake_word:
  id: mww
  models:
    - model: okay_nabu
    - model: hey_jarvis
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

# --- Voice Assistant ---

voice_assistant:
  id: va
  microphone: onju_mic
  media_player: onju_media_player
  micro_wake_word: mww
  noise_suppression_level: 4
  auto_gain: 31dBFS
  volume_multiplier: 2.0

  on_client_connected:
    - script.execute: start_wake_word
  on_client_disconnected:
    - script.execute: stop_wake_word

  on_listening:
    - script.execute: push_to_talk_timeout
    - light.turn_on:
        id: top_led
        blue: 100%
        red: 100%
        green: 100%
        brightness: 100%
        effect: listening

  on_stt_vad_end:
    - script.stop: push_to_talk_timeout
    - light.turn_on:
        id: top_led
        blue: 100%
        red: 0%
        green: 20%
        brightness: 70%
        effect: processing

  on_end:
    # Don't reset LED or restart MWW here.
    # on_idle in media_player handles both after speaker finishes.
    []

  on_error:
    - script.execute: reset_led
    - script.execute: start_wake_word

  on_timer_started:
    - lambda: id(active_timer_count) += 1;
    - script.execute: reset_led

  on_timer_finished:
    - lambda: |-
        id(active_timer_count) = std::max(0, id(active_timer_count) - 1);
    - script.execute: timer_alarm

  on_timer_cancelled:
    - lambda: |-
        id(active_timer_count) = std::max(0, id(active_timer_count) - 1);
    - script.execute: reset_led

  on_timer_tick:
    - script.execute: reset_led

# --- LEDs (6x SK6812) ---

light:
  - platform: esp32_rmt_led_strip
    id: leds
    pin: GPIO11
    chipset: SK6812
    num_leds: 6
    rgb_order: grb
    default_transition_length: 0s
    gamma_correct: 2.8

  - platform: partition
    id: left_led
    segments:
      - id: leds
        from: 0
        to: 0
    default_transition_length: 100ms

  - platform: partition
    id: top_led
    segments:
      - id: leds
        from: 1
        to: 4
    default_transition_length: 100ms
    effects:
      - pulse:
          name: pulse
          transition_length: 250ms
          update_interval: 250ms
      - pulse:
          name: slow_pulse
          transition_length: 1s
          update_interval: 2s
      - addressable_twinkle:
          name: listening_ww
          twinkle_probability: 1%
      - addressable_twinkle:
          name: listening
          twinkle_probability: 45%
      - addressable_scan:
          name: processing
          move_interval: 80ms
      - addressable_flicker:
          name: speaking
          intensity: 35%
      - addressable_lambda:
          name: show_volume
          update_interval: 50ms
          lambda: |-
            int int_volume = int(id(onju_media_player).volume * 100.0f * it.size());
            int full_leds = int_volume / 100;
            int last_brightness = int_volume % 100;
            int i = 0;
            for(; i < full_leds; i++) {
              it[i] = Color::WHITE;
            }
            if(i < 4) {
              it[i++] = Color(64, 64, 64).fade_to_white(last_brightness*256/100);
            }
            for(; i < it.size(); i++) {
              it[i] = Color(64, 64, 64);
            }

      - addressable_lambda:
          name: show_timer
          update_interval: 1000ms
          lambda: |-
            auto timers = id(va).get_timers();
            if (timers.empty()) return;
            uint32_t min_remaining = UINT32_MAX;
            uint32_t min_total = 1;
            for (const auto &t : timers) {
              if (t.seconds_left < min_remaining) {
                min_remaining = t.seconds_left;
                min_total = t.total_seconds;
              }
            }
            float fraction = min_total > 0 ? float(min_remaining) / float(min_total) : 0.0f;
            int lit = int(fraction * it.size() + 0.5f);
            for (int i = 0; i < it.size(); i++) {
              if (i < lit) {
                it[i] = Color(255, 140, 0);
              } else {
                it[i] = Color(40, 20, 0);
              }
            }
      - addressable_rainbow:
          name: rainbow
          speed: 10
          width: 4
      - addressable_lambda:
          name: fire
          update_interval: 50ms
          lambda: |-
            for (int i = 0; i < it.size(); i++) {
              uint8_t flicker = random(180, 255);
              it[i] = Color(flicker, flicker / 3, 0);
            }
      - addressable_scan:
          name: chase
          move_interval: 150ms
          scan_width: 1
      - addressable_lambda:
          name: strobe
          update_interval: 100ms
          lambda: |-
            static bool on = false;
            on = !on;
            if (on) {
              uint8_t r = random(0, 255);
              uint8_t g = random(0, 255);
              uint8_t b = random(0, 255);
              for (int i = 0; i < it.size(); i++) {
                it[i] = Color(r, g, b);
              }
            } else {
              for (int i = 0; i < it.size(); i++) {
                it[i] = Color::BLACK;
              }
            }

  - platform: partition
    id: right_led
    segments:
      - id: leds
        from: 5
        to: 5
    default_transition_length: 100ms

# --- Touch controls ---
# ESP32-S3 touch threshold is a delta value (not absolute) in ESP-IDF 5.x.
# 2000 works well for the Nest Mini's capacitive top panel.

esp32_touch:
  setup_mode: false
  measurement_duration: 0.25ms
  sleep_duration: 2ms

binary_sensor:
  - platform: esp32_touch
    id: volume_down
    pin: GPIO4
    threshold: 2000
    on_press:
      then:
        - light.turn_on: left_led
        - script.execute:
            id: adjust_volume
            delta: -0.05
        - delay: 750ms
        - while:
            condition:
              binary_sensor.is_on: volume_down
            then:
              - script.execute:
                  id: adjust_volume
                  delta: -0.05
              - delay: 150ms
    on_release:
      then:
        - light.turn_off: left_led
        - script.execute: show_volume_then_restore

  - platform: esp32_touch
    id: volume_up
    pin: GPIO2
    threshold: 2000
    on_press:
      then:
        - light.turn_on: right_led
        - script.execute:
            id: adjust_volume
            delta: 0.05
        - delay: 750ms
        - while:
            condition:
              binary_sensor.is_on: volume_up
            then:
              - script.execute:
                  id: adjust_volume
                  delta: 0.05
              - delay: 150ms
    on_release:
      then:
        - light.turn_off: right_led
        - script.execute: show_volume_then_restore

  - platform: esp32_touch
    id: action
    pin: GPIO3
    threshold: 2000
    on_click:
      - if:
          condition:
            lambda: return id(timer_alarm_active);
          then:
            - script.execute: dismiss_alarm
          else:
            - if:
                condition:
                  lambda: |-
                    return id(onju_media_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING;
                then:
                  - lambda: |-
                      id(onju_media_player)
                        ->make_call()
                        .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
                        .perform();
                else:
                  - if:
                      condition: voice_assistant.is_running
                      then:
                        - voice_assistant.stop:
                      else:
                        - voice_assistant.start:

  - platform: gpio
    id: mute_switch
    pin:
      number: GPIO38
      mode: INPUT_PULLUP
    name: Disable wake word
    on_press:
      - script.execute: stop_wake_word
    on_release:
      - script.execute: start_wake_word

# --- Switches ---

switch:
  - platform: template
    name: Use Wake Word
    id: use_wake_word
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: start_wake_word
    on_turn_off:
      - script.execute: stop_wake_word

  - platform: template
    name: Wake Word Listening Light
    id: flicker_wake_word
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: reset_led
    on_turn_off:
      - script.execute: reset_led

  - platform: template
    name: Timer LED
    id: timer_led
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: reset_led
    on_turn_off:
      - script.execute: reset_led

  - platform: template
    name: Volume Sound
    id: volume_sound
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: gpio
    id: dac_mute
    restore_mode: ALWAYS_OFF
    pin:
      number: GPIO21
      inverted: true

# --- Music LED Mode ---

select:
  - platform: template
    name: Music LED Mode
    id: music_led_mode
    icon: "mdi:led-strip-variant"
    entity_category: config
    optimistic: true
    restore_value: true
    options:
      - "off"
      - "solid"
      - "rainbow"
      - "fire"
      - "chase"
      - "strobe"
      - "cycle"
    initial_option: "solid"
    on_value:
      then:
        - script.execute: reset_led

# --- Settings ---

number:
  - platform: template
    name: Noise Suppression Level
    id: noise_suppression_setting
    icon: "mdi:microphone-settings"
    entity_category: config
    initial_value: 4
    min_value: 0
    max_value: 4
    step: 1
    optimistic: true
    restore_value: true
    on_value:
      then:
        - lambda: id(va).set_noise_suppression_level((uint8_t)x);

# --- Globals ---

globals:
  - id: showing_volume
    type: bool
    restore_value: false
    initial_value: "false"

  - id: timer_alarm_active
    type: bool
    restore_value: false
    initial_value: "false"

  - id: active_timer_count
    type: int
    restore_value: false
    initial_value: "0"

# --- Scripts ---

script:
  - id: reset_led
    then:
      - if:
          condition:
            lambda: return id(showing_volume);
          then:
            []
          else:
            - if:
                condition:
                  lambda: return id(timer_alarm_active);
                then:
                  - light.turn_on:
                      id: top_led
                      red: 100%
                      green: 0%
                      blue: 0%
                      brightness: 100%
                      effect: pulse
                else:
                  - if:
                      condition:
                        lambda: |-
                          return id(onju_media_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING;
                      then:
                        - if:
                            condition:
                              lambda: return id(music_led_mode).state != "off";
                            then:
                              - script.execute: apply_music_led
                            else:
                              - light.turn_off: top_led
                      else:
                        - if:
                            condition:
                              lambda: |-
                                return id(onju_media_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING;
                            then:
                              - light.turn_on:
                                  id: top_led
                                  blue: 0%
                                  red: 20%
                                  green: 100%
                                  effect: speaking
                            else:
                              - if:
                                  condition:
                                    and:
                                      - lambda: return id(active_timer_count) > 0;
                                      - switch.is_on: timer_led
                                  then:
                                    - light.turn_on:
                                        id: top_led
                                        red: 100%
                                        green: 60%
                                        blue: 0%
                                        brightness: 70%
                                        effect: show_timer
                                  else:
                                    - if:
                                        condition:
                                          and:
                                            - switch.is_on: use_wake_word
                                            - switch.is_on: flicker_wake_word
                                            - binary_sensor.is_off: mute_switch
                                        then:
                                          - light.turn_on:
                                              id: top_led
                                              blue: 100%
                                              red: 100%
                                              green: 0%
                                              brightness: 60%
                                              effect: listening_ww
                                        else:
                                          - light.turn_off: top_led

  - id: timer_alarm
    mode: single
    then:
      - lambda: id(timer_alarm_active) = true;
      - script.execute: reset_led
      - while:
          condition:
            lambda: return id(timer_alarm_active);
          then:
            - rtttl.play:
                rtttl: "alarm:d=8,o=6,b=200:c,e,g,c7,p,c7,g,e,c"
            - delay: 1500ms

  - id: dismiss_alarm
    mode: single
    then:
      - rtttl.stop:
      - lambda: id(timer_alarm_active) = false;
      - script.execute: reset_led

  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - binary_sensor.is_off: mute_switch
              - switch.is_on: use_wake_word
          then:
            - micro_wake_word.start
            - script.execute: reset_led

  - id: stop_wake_word
    then:
      - micro_wake_word.stop
      - script.execute: reset_led

  - id: adjust_volume
    parameters:
      delta: float
    then:
      - lambda: id(showing_volume) = true;
      - media_player.volume_set:
          id: onju_media_player
          volume: !lambda return clamp(id(onju_media_player).volume + delta, 0.0f, 1.0f);
      - light.turn_on:
          id: top_led
          effect: show_volume
      - if:
          condition:
            and:
              - switch.is_on: volume_sound
              - media_player.is_idle: onju_media_player
          then:
            - rtttl.play:
                rtttl: "click:d=32,o=7,b=900:c"

  - id: show_volume_then_restore
    mode: restart
    then:
      - delay: 2s
      - lambda: id(showing_volume) = false;
      - script.execute: reset_led

  - id: push_to_talk_timeout
    mode: restart
    then:
      - delay: 15s
      - voice_assistant.stop:
      - script.execute: reset_led
      - script.execute: start_wake_word

  - id: apply_music_led
    then:
      - lambda: |-
          auto mode = id(music_led_mode).state;
          if (mode == "cycle") {
            id(party_cycle).execute();
            return;
          }
          auto call = id(top_led).turn_on();
          call.set_brightness(1.0f);
          if (mode == "solid") {
            call.set_rgb(0.0f, 0.6f, 1.0f);
            call.set_brightness(0.5f);
            call.set_effect("speaking");
          } else if (mode == "rainbow") {
            call.set_effect("rainbow");
          } else if (mode == "fire") {
            call.set_effect("fire");
          } else if (mode == "chase") {
            call.set_effect("chase");
          } else if (mode == "strobe") {
            call.set_effect("strobe");
          }
          call.perform();

  - id: party_cycle
    mode: restart
    then:
      - while:
          condition:
            lambda: 'return id(music_led_mode).state == "cycle" && id(onju_media_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_PLAYING;'
          then:
            - light.turn_on: { id: top_led, brightness: 100%, effect: "rainbow" }
            - delay: 30s
            - light.turn_on: { id: top_led, brightness: 100%, effect: "fire" }
            - delay: 30s
            - light.turn_on: { id: top_led, brightness: 100%, effect: "chase" }
            - delay: 30s
            - light.turn_on: { id: top_led, brightness: 100%, effect: "strobe" }
            - delay: 30s
